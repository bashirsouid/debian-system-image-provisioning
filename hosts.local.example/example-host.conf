# Host instance descriptor — TEMPLATE for a brand-new machine.
# Copy to hosts.local/<your-host>.conf and edit every value.
# See docs/host-descriptors.md for the full key reference.

# Space-separated profile and/or role names.
profiles        = devbox

hostname        = example-host
image_id_suffix = examplehost

# Extra kernel command line (optional).
# kernel_cmdline  = quiet

# Secure Boot: yes (sign the UKI) or no (write an opt-out marker).
secure_boot     = yes

# Persistent /home: "<source> [fstype]" (optional). Omit if /home should
# live in the rootfs (e.g. a server or a throwaway machine).
# persistent_home = LABEL=HOME ext4

# Extra host-only packages, space-separated (optional). Prefer a profile
# for anything reusable; use this only for genuinely host-specific needs.
packages        = firmware-linux

# Non-secret backup path list (optional) -> /etc/s3-backup-paths.conf.
# backup_paths  = /etc /home
