# Host instance descriptor — ThinkPad X1 Gen13 (Intel Lunar Lake).
# Copy to hosts.local/x1g13.conf and edit.
#
# Hardware enablement lives in the thinkpad-g13 + thinkpad-x1g13 model
# profiles (firmware, audio, Xorg, NPU). See docs/host-descriptors.md.

profiles        = kernel-rolling docker thinkpad-g13 thinkpad-x1g13 laptop-screen display-manager-gdm3 awesomewm dev-tools dev-mkosi dev-ansible devbox audio-pipewire wifi ssh-server ssh-2fa tailscale cloudflare-tunnel healthchecksio ab-diagnostics signal vscode antigravity bluetooth brother-printer intel-npu flatpak digikam zoom-web symlink-docker symlink-k3s user-power-control watchdog-battery solaar timezone-los-angeles s3-unencrypted-backup kopia kopia-cloud-backup kopia-filesystem-backup
hostname        = x1g13
image_id_suffix = x1g13
kernel_cmdline  = modprobe.blacklist=i915 systemd.unit=default.target splash video=eDP-1:1920x1200@60
secure_boot     = yes

# /home on a dedicated partition so A/B root updates never touch user data.
persistent_home = LABEL=HOME ext4

# Non-secret backup path list -> /etc/s3-backup-paths.conf.
backup_paths    = /etc/s3-backup-paths.conf

# Kopia backup stack (non-secret config). Secrets — the shared kopia-password
# passphrase and a kopia-s3-creds-<name>.json per cloud target — go in the age
# vault (bin/mkosi-vault-edit.sh), NOT here.
#
# Filesystem targets are "name:/mountpoint"; the repo lives at
# <mountpoint>/backup.kopia and an unmounted drive is skipped, so you can
# rotate spare disks freely. Cloud targets are "name:https://endpoint".
kopia_filesystem_targets = ext1:/mnt/ext1 ext2:/mnt/ext2
kopia_cloud_targets      = wasabi:https://s3.us-west-1.wasabisys.com
# kopia_sources          = /home              # default is /home
# kopia_extra_excludes   = *.iso /mnt/data/Cache/
