[Content]
CleanPackageMetadata=no
Packages=
    # ── Wayland infrastructure ──────────────────────────────────────────
    wayland-protocols
    libwayland-client0
    libseat1
    libxkbcommon0
    libinput10
    xwayland
    # ── Session / desktop glue ──────────────────────────────────────────
    dbus
    dbus-user-session
    polkitd
    accountsservice
    # ── XDG desktop portals ─────────────────────────────────────────────
    xdg-desktop-portal
    xdg-desktop-portal-gtk
    xdg-desktop-portal-wlr
    # ── Window compositor ───────────────────────────────────────────────
    sway
    swaylock
    swaybg
    swayidle
    wofi
    wdisplays
    grim
    slurp
    wl-clipboard
    cliphist
    # ── Audio ──────────────────────────────────────────────────────────
    pipewire-pulse
    wireplumber
    pipewire-alsa
    libspa-0.2-bluetooth
    bluez
    rtkit
    alsa-utils
    pulseaudio-utils
    pavucontrol
    upower
    # ── Terminal ───────────────────────────────────────────────────────
    kitty
    foot
    # ── Productivity and utilities ──────────────────────────────────────
    mousepad
    qalc
    atuin
    jq
    libnotify-bin
    iw
    pamixer
    fonts-jetbrains-mono
    fonts-powerline
    at-spi2-core
    python3-i3ipc
    # ── Essential system tools ──────────────────────────────────────────
    brightnessctl
    brightness-udev
    # ── Notifications ───────────────────────────────────────────────────
    dunst

BuildPackages=
    wayland-protocols
    libwayland-client0
    libxkbcommon-dev
    libinput-dev
    libxkbcommon-x11-dev
    pkg-config