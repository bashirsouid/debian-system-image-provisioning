# joystickwake - prevents DPMS timeout on controller input
#
# Do NOT add a bare "Packages=" here: in mkosi an empty list assignment
# RESETS the accumulated package list, wiping the base + every other
# profile's packages (symptom: tiny image, "no kernel was found"). If the
# joystickwake package becomes available, add it WITH a value:
# Packages=
#     joystickwake