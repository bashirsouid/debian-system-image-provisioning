# Type Name ID GECOS Home Shell
#
# Dedicated, locked-down system account for the Kopia backup stack. Created
# automatically at first boot by systemd-sysusers (NOT from the age vault).
# The backup services read all source files (incl. other users' 0700 homes)
# via AmbientCapabilities=CAP_DAC_READ_SEARCH, so kopia does NOT need group
# read access to /home — hence no "archivereaders" group is needed.
g kopia 5000 - -
u kopia 5000 "Kopia backup user" /home/kopia /usr/sbin/nologin
