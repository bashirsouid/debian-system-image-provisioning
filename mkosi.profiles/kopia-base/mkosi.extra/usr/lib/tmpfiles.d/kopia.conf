# Runtime directories for the Kopia backup stack, owned by the kopia user so
# both the systemd services and an interactive `sudo -u kopia` mount session
# can use them. (The services also declare StateDirectory/CacheDirectory=kopia;
# these entries make the dirs exist for the non-systemd mount path too.)
d /var/lib/kopia   0750 kopia kopia -
d /var/cache/kopia 0750 kopia kopia -
# Mount root for restores, locked to the kopia user (mounted backups are only
# browseable by kopia). Each target mounts into its own /mnt/kopia/<name> subdir.
d /mnt/kopia       0750 kopia kopia -

# Credstore access for the kopia user. The helper scripts read their secrets
# directly from /etc/credstore (kopia-password, kopia-s3-creds-*.json,
# kopia-*-healthcheck-url). The systemd backup services reach them via
# AmbientCapabilities=CAP_DAC_READ_SEARCH, but the interactive
# `sudo -u kopia .../kopia.backup.mount.bash` path runs with the kopia user's
# plain DAC permissions, so the directory must be group-traversable and the
# kopia-owned secrets group-readable. package-credentials.sh stages these
# root:kopia 0640 in the extra-tree, but mkosi does not reliably preserve that
# ownership (it can land as root:root), so re-assert it here at every boot.
# Other credstore secrets (tailscale, cloudflared, mailjet, ...) have no kopia-
# prefix and keep their 0600 root:root mode, staying unreadable by kopia.
z /etc/credstore          0750 root kopia -
z /etc/credstore/kopia-*  0640 root kopia -
