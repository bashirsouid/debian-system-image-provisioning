# /etc/kopia/sources.conf
# Filesystem paths to snapshot, one per line. Applies to every backup target
# (filesystem and cloud). '#' starts a comment; blank lines are ignored.
#
# Override per host with the `kopia_sources` descriptor key, which regenerates
# this file. If empty/absent, the scripts default to /home.
#
# One-off change between builds: edit this file in place. It is re-read on every
# backup run (no rebuild needed) and takes full effect immediately; the next
# mkosi build overwrites it. See kopia-base/README.md ("One-off include/exclude
# edits").
/home
