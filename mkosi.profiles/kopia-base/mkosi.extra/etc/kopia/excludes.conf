# /etc/kopia/excludes.conf
# Global Kopia ignore patterns applied to every backup repository (filesystem
# and cloud). One pattern per line; '#' starts a comment; blank lines ignored.
# These are applied via `kopia policy set --global --add-ignore`.
#
# Per-host additions go in /etc/kopia/excludes.local.conf (rendered from the
# `kopia_extra_excludes` descriptor key) and are merged on top of this list.
#
# In addition, any directory containing a file named `nobackup` is skipped
# (--add-dot-ignore=nobackup), so you can opt a folder out without editing this.
#
# One-off change between builds: edit this file in place. It is re-read on every
# backup run. *Adding* a pattern takes effect immediately; to *re-enable* an
# excluded path, add it to /etc/kopia/clear.excludes.conf rather than deleting
# it here (Kopia persists ignore rules in the repo policy, so a deleted line has
# no effect on its own). The next mkosi build overwrites this file. See
# kopia-base/README.md ("One-off include/exclude edits").

