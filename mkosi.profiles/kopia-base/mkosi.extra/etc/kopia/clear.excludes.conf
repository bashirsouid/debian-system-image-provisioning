# /etc/kopia/clear.excludes.conf
# Patterns to RE-ENABLE (un-ignore), one per line. Each line here is removed
# from the global Kopia ignore policy via `kopia policy set --remove-ignore`,
# undoing a matching entry in /etc/kopia/excludes.conf or excludes.local.conf.
# '#' starts a comment; blank lines are ignored.
#
# The pattern must match the excluded entry EXACTLY, trailing slash included --
# e.g. excludes.conf carries both `.zoom` and `.zoom/`, so re-enabling that
# folder means listing both lines here.
#
# This is the surgical counterpart to the excludes files: it touches only the
# named rules, never the rest of the repository's policy state. Ships empty, so
# by default nothing is re-enabled.
#
# One-off change between builds: edit this file in place. It is re-read on every
# backup run (no rebuild needed); the next mkosi build overwrites it back to
# this empty template. See kopia-base/README.md ("One-off include/exclude
# edits").
