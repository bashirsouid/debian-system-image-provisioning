# Allow non-root users to pass the allow_other / allow_root FUSE mount options.
#
# Required so `kopia mount --fuse-allow-other` (run as the unprivileged kopia
# user by /usr/lib/kopia/kopia.backup.mount.bash) can expose the read-only
# snapshot tree for `sudo` browsing during recovery. Without this, fusermount
# refuses allow_other for non-root callers and the mount is visible only to the
# kopia account (which is nologin), so nobody could read the files.
#
# The locked-down restore path (kopia.backup.restore.bash) does not rely on
# this; it never mounts.
user_allow_other
