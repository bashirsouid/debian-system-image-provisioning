# cloudflared-repo — shared base for Cloudflare's apt repository.
#
# Repo-only base profile: ships the cloudflared apt source + signing key (and
# the apt-keys.conf that fetch-third-party-keys.sh uses to refresh/pin the key).
# Installs no packages — consumers add `cloudflared` to their own Packages=.
#
# Pulled in automatically via `requires=cloudflared-repo` by profiles that need
# the cloudflared package (cloudflare-tunnel, ssh-client-cloudbox-profile); not
# selected directly.
#
# IMPORTANT: do not add a bare "Packages=" line here — an empty list assignment
# RESETS mkosi's accumulated package list (see mkosi.profiles/README.md).
