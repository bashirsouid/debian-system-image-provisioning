[Content]
# Telegraf metrics agent. Apt source + signing-key fingerprint pinning
# live in mkosi.profiles/telegraf/apt-keys.conf and the .sources file
# under mkosi.profiles/telegraf/mkosi.extra/etc/apt/sources.list.d/.
# update-3rd-party-deps.sh fetches + pins the InfluxData signing key
# before the next build, so adding 'telegraf' to a host's
# profile.default is enough to install the agent.
Packages=
    telegraf
