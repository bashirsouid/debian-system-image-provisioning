# Telegraf metrics agent. Apt source + signing-key fingerprint pinning
# are already wired up in:
#   mkosi.profiles/telegraf/apt-keys.conf
#   mkosi.profiles/telegraf/mkosi.extra/etc/apt/sources.list.d/influxdata.sources
#
# To enable: uncomment Packages= below and add 'telegraf' to a host's
# profile.default. update-3rd-party-deps.sh will fetch + verify the
# InfluxData signing key on the next build.
#
# Packages=
#     telegraf
