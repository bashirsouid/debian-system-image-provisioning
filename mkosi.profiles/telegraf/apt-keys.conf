# apt-keys.conf for the telegraf profile.
# See mkosi.profiles/tailscale/apt-keys.conf for format docs.
#
# InfluxData rotated their signing key in 2023. Verify the current key
# from https://docs.influxdata.com/telegraf/latest/install/ before
# pinning. After verifying, replace REPLACE_VERIFY_FROM_INFLUXDATA_DOCS
# and uncomment Packages= in mkosi.conf.

KEY_1_NAME="influxdata-archive"
KEY_1_URL="https://repos.influxdata.com/influxdata-archive.key"
KEY_1_FINGERPRINT="REPLACE_VERIFY_FROM_INFLUXDATA_DOCS"
KEY_1_OUT="etc/apt/keyrings/influxdata-archive.gpg"
