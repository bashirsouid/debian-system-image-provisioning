[Content]
# Devbox = Liquorix kernel + spice-vdagent for QEMU/virt guests.
# Composable pieces that used to live here (awesome window manager,
# xorg, dev-tools) are now separate profiles — compose a real devbox
# with e.g.  `devbox awesomewm dev-tools` (or use the group_dev role).
CleanPackageMetadata=no
Packages=
    linux-image-liquorix-amd64
    linux-headers-liquorix-amd64
    dpkg
    kmod
    spice-vdagent

[Runtime]
KernelCommandLineExtra=video=1280x720
