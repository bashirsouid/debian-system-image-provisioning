[Content]
# Google Antigravity (agentic IDE). Upstream distributes only as an
# AppImage / .deb today (no apt repo, no Flathub package), and the URL
# is not stable enough to bake into the build. Strategy:
#
#   1. Install the runtime libraries every desktop AppImage needs
#      (libfuse2 for AppImage's FUSE mount, zenity for prompts).
#   2. Pre-create /opt/antigravity/ at 0755 and ship a launcher +
#      desktop entry that resolves the binary at run time. The user
#      drops their downloaded AppImage as
#        /opt/antigravity/Antigravity.AppImage
#      (chmod +x), and the launcher / desktop entry pick it up — no
#      rebuild required.
#
# Once Antigravity ships on Flathub, switch to:
#     pair with 'flatpak' profile and add a first-boot oneshot that
#     does `flatpak install -y flathub <app-id>`.
Packages=
    libfuse2t64
    zenity
    desktop-file-utils
