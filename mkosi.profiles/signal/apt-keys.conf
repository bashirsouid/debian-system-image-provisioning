# apt-keys.conf for the signal profile.
# See mkosi.profiles/tailscale/apt-keys.conf for format docs.
#
# To enable this profile:
#   1. Fetch the key from https://updates.signal.org/desktop/apt/keys.asc
#      and verify the fingerprint against:
#        - the Signal install docs (https://signal.org/download/linux/)
#        - the corresponding fingerprint published on Signal's GitHub
#   2. Replace REPLACE_VERIFY_FROM_SIGNAL_DOCS below with the verified
#      40-char hex fingerprint.
#   3. Uncomment Packages= in mkosi.conf.

KEY_1_NAME="signal-desktop-keyring"
KEY_1_URL="https://updates.signal.org/desktop/apt/keys.asc"
KEY_1_FINGERPRINT="REPLACE_VERIFY_FROM_SIGNAL_DOCS"
KEY_1_OUT="etc/apt/keyrings/signal-desktop-keyring.gpg"
