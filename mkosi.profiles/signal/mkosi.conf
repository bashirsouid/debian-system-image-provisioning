# Signal Desktop. Apt source + signing-key fingerprint pinning are
# already wired up in:
#   mkosi.profiles/signal/apt-keys.conf
#   mkosi.profiles/signal/mkosi.extra/etc/apt/sources.list.d/signal.sources
#
# To enable: uncomment Packages= below and add 'signal' to a host's
# profile.default. update-3rd-party-deps.sh will fetch + verify the
# Signal signing key on the next build.
#
# Packages=
#     signal-desktop
