[Content]
# Signal Desktop. Apt source + signing-key fingerprint pinning live in
# mkosi.profiles/signal/apt-keys.conf and the .sources file under
# mkosi.profiles/signal/mkosi.extra/etc/apt/sources.list.d/.
# update-3rd-party-deps.sh fetches + pins the Signal signing key before
# the next build, so adding 'signal' to a host's profile.default is
# enough to install the desktop app.
Packages=
    signal-desktop
