# apt-keys.conf for the docker profile.
#
# Format: shell-sourceable. One block per signing key, indexed via a
# numeric suffix (KEY_1_*, KEY_2_*, ...). Keys are fetched at build
# time by scripts/fetch-third-party-keys.sh into:
#   mkosi.profiles/<profile>/mkosi.extra/etc/apt/keyrings/<KEY_n_OUT>
#
# Required fields:
#   KEY_n_NAME         - human-readable label printed during fetch
#   KEY_n_URL          - HTTPS URL to fetch the key from. Must end up
#                        as an OpenPGP key (binary or ASCII-armored).
#   KEY_n_FINGERPRINT  - PINNED 40-char hex (case-insensitive, spaces
#                        ignored) of the expected key. Mismatch fails
#                        the build closed; rotation requires editing
#                        this file with a freshly verified fingerprint.
#   KEY_n_OUT          - path under the profile's mkosi.extra/ where
#                        the dearmored key gets written. Must match
#                        Signed-By= in the matching .sources file.

KEY_1_NAME="docker-archive-keyring"
KEY_1_URL="https://download.docker.com/linux/debian/gpg"
# Official Docker GPG fingerprint: 9DC858229FC7DD38854AE2D88D81803C0EBFCD88
KEY_1_FINGERPRINT="9DC858229FC7DD38854AE2D88D81803C0EBFCD88"
KEY_1_OUT="etc/apt/keyrings/docker.gpg"
