# kernel-lts — the stable Debian kernel for this release (trixie).
#
# Installs the architecture-appropriate linux-image / linux-headers
# *meta-package*, which always resolves to the newest kernel in the
# pinned stable archive. Nothing here is version-pinned, so this profile
# never goes stale: when the snapshot mirror in
# mkosi.conf.d/15-reproducibility.conf is bumped, the kernel moves with
# it automatically.
#
# Architecture is selected by [Match] in mkosi.conf.d/10-*.conf, so the
# same profile name works for amd64 and arm64 — the build architecture
# (host descriptor `architecture =`, default x86-64) picks the right
# package. This supersedes the old per-arch kernel-amd64 / kernel-arm64
# profiles.
#
# Want a newer kernel than stable ships? Use kernel-rolling instead.
