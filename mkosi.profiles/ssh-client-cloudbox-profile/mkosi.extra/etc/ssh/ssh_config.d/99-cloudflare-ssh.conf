# /etc/ssh/ssh_config.d/99-cloudflare-ssh.conf
# SSH client configuration for connecting to SSH hosts via Cloudflare Tunnel.
# This file is included by the system-wide SSH client config.
#
# Usage: Place your tunnel hostname in ~/.ssh/config or use directly:
#   ssh -F /etc/ssh/ssh_config user@ssh.yourdomain.com
#
# Or add an alias in your personal ~/.ssh/config:
#   Host my-cloudbox
#       HostName ssh.yourdomain.com
#       User yourusername
#
# Then `ssh my-cloudbox` will automatically proxy through cloudflared.

# Default configuration for Cloudflare SSH Access.
# Replace ssh.yourdomain.com with your actual tunnel hostname.
# The cloudflared package provides the 'cloudflared' binary in /usr/bin.
Host ssh.yourdomain.com
    ProxyCommand /usr/bin/cloudflared access ssh --hostname %h
    # Optional: add your preferred user here
    # User cloudboxadmin