# ThinkPad X1 Gen13 (Lunar Lake) hardware enablement.
#
# This is a *model* profile: everything in it is generic to the X1 G13
# hardware, not to any one person's machine. It layers on top of the
# thinkpad-g13 profile (which installs the firmware/tlp/audio packages)
# and adds the X1-G13-specific pieces that aren't shipped by Debian yet:
#
#   * manually-placed Lunar Lake firmware blobs (mkosi.extra/usr/lib/firmware):
#     iwlwifi BE201, xe GPU, SOF/IPC4 audio (cs42l43 + cs35l56 speakers),
#     VPU/NPU, Bluetooth.
#   * an apt pin (mkosi.extra/etc/apt/preferences.d/firmware-from-backports)
#     pulling firmware-* from trixie-backports.
#   * Xorg/libinput/trackpoint, eDP framebuffer, modprobe (iwlwifi/xe),
#     SSD sysfs, TLP, speaker-DAC WirePlumber priority + ensure-speaker-dac
#     user units, and the lnl-drivers-reload unit.
#
# Select it alongside thinkpad-g13. There are no packages to install
# here; the package set lives in thinkpad-g13. mkosi applies this
# profile's mkosi.extra/ as an ExtraTree when the profile is selected.

# NOTE: do NOT add an empty "Packages=" here. In mkosi an empty list
# assignment RESETS the accumulated package list, wiping the base config
# and every other selected profile's packages (symptom: a tiny image with
# no kernel — "no kernel was found"). This profile ships only mkosi.extra/
# files; its package set lives in thinkpad-g13.
