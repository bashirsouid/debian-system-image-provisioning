# ThinkPad X1 Carbon Gen 13 — prefer internal Speaker as default sink
#
# The sof-soundwire card advertises HDMI sinks alongside the Speaker sink.
# Without this rule, WirePlumber may pick an HDMI sink as the default,
# which has no physical display attached.  This gives the Speaker sink
# higher session priority so applications route to it out of the box.

monitor.alsa.rules = [
  {
    matches = [
      {
        node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.HiFi__Speaker__sink"
      }
    ]
    actions = {
      update-props = {
        priority.session = 2500
      }
    }
  }
]
