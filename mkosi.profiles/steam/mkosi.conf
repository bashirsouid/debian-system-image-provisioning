# Steam is packaged in Debian non-free + multiverse. Enabling i386
# multilib is required for 32-bit game binaries:
#     dpkg --add-architecture i386 && apt update
# Uncomment once multilib + non-free are confirmed wired in mkosi.conf.d/
# for this host:
#
# Packages=
#     steam-installer
#     libgl1-mesa-dri:i386
#     libgl1:i386
