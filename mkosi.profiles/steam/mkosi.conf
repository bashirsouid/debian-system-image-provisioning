# Steam = the steam-installer wrapper from Debian non-free + the i386
# GL stack so 32-bit game binaries can find their libraries.
#
# Why nothing is listed here: mkosi pins its main package-install
# invocation to amd64 (`-o APT::Architectures=amd64`), so :i386 names
# in this Packages= list cannot be resolved — apt errors out with
# "Unable to locate package libgl1:i386" even after `dpkg --add-
# architecture i386`. The fix is to defer steam install to
# mkosi.postinst (the hook right next to this file), which runs in
# the chroot AFTER mkosi's main package step finishes; our own apt
# invocation there sees the i386 architecture we just enabled and
# resolves the deps normally.
#
# non-free / non-free-firmware components must be enabled at the
# distribution level. The base mkosi.conf in this repo includes
# non-free-firmware out of the box; if your build also needs the
# legacy non-free component for a specific game library, add it via
# hosts/<host>/mkosi.conf.d/.
