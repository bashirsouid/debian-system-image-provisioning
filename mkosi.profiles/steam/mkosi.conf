[Content]
# Steam = the steam-installer wrapper from Debian non-free + the i386
# GL stack so 32-bit game binaries can find their libraries. Enabling
# i386 multilib happens in this profile's mkosi.prepare hook (see
# next to this file): mkosi runs every selected profile's prepare
# script inside the build chroot before package install, which is the
# right hook because dpkg --add-architecture must run BEFORE apt-get
# install -y steam-installer can resolve :i386 deps.
#
# non-free / non-free-firmware components must be enabled at the
# distribution level. The base mkosi.conf in this repo includes
# non-free-firmware out of the box; if your build also needs the
# legacy non-free component for a specific game library, add it via
# hosts/<host>/mkosi.conf.d/.
Packages=
    steam-installer
    libgl1-mesa-dri:i386
    libgl1:i386
    libegl1:i386
    libgbm1:i386
    libvulkan1
    libvulkan1:i386
    mesa-vulkan-drivers
    mesa-vulkan-drivers:i386
    fonts-liberation
