# apt-keys.conf for the kopia profile.
# See mkosi.profiles/tailscale/apt-keys.conf for format docs.
#
# Kopia publishes binary releases at kopia.io/downloads/ and an apt
# repo. Verify the signing key fingerprint from kopia.io before
# pinning. Replace REPLACE_VERIFY_FROM_KOPIA_DOCS with the verified
# fingerprint, then uncomment Packages= in mkosi.conf.

KEY_1_NAME="kopia"
KEY_1_URL="https://kopia.io/signing-key"
KEY_1_FINGERPRINT="REPLACE_VERIFY_FROM_KOPIA_DOCS"
KEY_1_OUT="etc/apt/keyrings/kopia.gpg"
