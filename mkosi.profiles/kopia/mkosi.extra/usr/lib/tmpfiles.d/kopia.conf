# Runtime directories for the Kopia backup stack, owned by the kopia user so
# both the systemd services and an interactive `sudo -u kopia` mount session
# can use them. (The services also declare StateDirectory/CacheDirectory=kopia;
# these entries make the dirs exist for the non-systemd mount path too.)
d /var/lib/kopia   0750 kopia kopia -
d /var/cache/kopia 0750 kopia kopia -
# Mount root for restores, locked to the kopia user (mounted backups are only
# browseable by kopia). Each target mounts into its own /mnt/kopia/<name> subdir.
d /mnt/kopia       0750 kopia kopia -
