[Content]
# Kopia backup CLI. Apt source + signing-key fingerprint pinning live in
# mkosi.profiles/kopia/apt-keys.conf and the .sources file under
# mkosi.profiles/kopia/mkosi.extra/etc/apt/sources.list.d/.
# update-3rd-party-deps.sh fetches + pins the Kopia signing key before
# the next build, so adding 'kopia' to a host's profile.default is
# enough to install the kopia CLI.
Packages=
    kopia
