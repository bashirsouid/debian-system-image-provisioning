# kopia-filesystem-backup — hourly encrypted Kopia snapshots to one or more
# local/USB filesystem destinations (the kopia_filesystem_targets descriptor
# list). Unmounted drives are skipped, so rotating spare disks "just works".
# NOTE: Requires the kopia profile to be selected alongside this profile.
# Bundle both with: --profile=backup (the backup role includes
# kopia, kopia-cloud-backup, kopia-filesystem-backup).
