[Content]
Packages=
    pipewire-audio
    pipewire-pulse
    wireplumber
    # pipewire-alsa provides the ALSA backend for PipeWire.
    # CRITICAL: Without this, PipeWire falls back to "Dummy Output" and cannot access
    # real audio devices. Previous configs incorrectly used libspa-0.2-alsa which does
    # not exist in current Debian repositories, causing silent audio failures.
    pipewire-alsa
    libspa-0.2-bluetooth
    bluez
    rtkit
    alsa-utils
    pulseaudio-utils
    pavucontrol
    upower
    libspa-0.2-libcamera
    # dbus-user-session: provides dbus.service for the user systemd instance.
    # Without it, pipewire.service, wireplumber.service, and any other user
    # service with a dbus dependency silently fail to start at login.
    # Distinct from the `dbus` package which only provides the system bus.
    dbus-user-session
    alsa-ucm-conf
