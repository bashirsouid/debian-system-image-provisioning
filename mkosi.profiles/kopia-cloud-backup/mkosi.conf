# kopia-cloud-backup — hourly encrypted Kopia snapshots to one or more
# S3-compatible endpoints (the kopia_cloud_targets descriptor list).
# NOTE: Requires the kopia profile to be selected alongside this profile.
# Bundle both with: --profile=backup (the backup role includes
# kopia, kopia-cloud-backup, kopia-filesystem-backup).
# This profile only provides the timer/service units. The backup scripts
# and the kopia CLI are installed by the kopia profile.
#
# Do NOT add an empty "Packages=" here: in mkosi an empty list assignment
# RESETS the accumulated package list, wiping the base + every other
# profile's packages (symptom: tiny image, "no kernel was found").
