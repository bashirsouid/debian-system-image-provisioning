[Content]
# Microsoft VSCode. Apt source + signing-key fingerprint pinning live in:
#   mkosi.profiles/vscode/apt-keys.conf
#   mkosi.profiles/vscode/mkosi.extra/etc/apt/sources.list.d/vscode.sources
# update-3rd-party-deps.sh fetches + verifies the Microsoft signing key
# and writes it to mkosi.extra/etc/apt/keyrings/microsoft.gpg before the
# next build, so adding 'vscode' to a host's profile.default is enough
# to get `code` installed in the image.
Packages=
    code
