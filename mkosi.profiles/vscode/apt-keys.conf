# apt-keys.conf for the vscode profile.
# See mkosi.profiles/tailscale/apt-keys.conf for format docs.
#
# To enable this profile:
#   1. Verify Microsoft's signing key fingerprint from
#      https://packages.microsoft.com/keys/microsoft.asc and one
#      independent source (Microsoft docs or GitHub MSDocs repo).
#   2. Replace REPLACE_VERIFY_FROM_MS_DOCS below with the verified
#      40-char fingerprint.
#   3. Uncomment Packages= in mkosi.conf.
#
# scripts/fetch-third-party-keys.sh logs + skips REPLACE_* placeholders
# so update-3rd-party-deps.sh doesn't trip on un-pinned stubs.

KEY_1_NAME="microsoft"
KEY_1_URL="https://packages.microsoft.com/keys/microsoft.asc"
KEY_1_FINGERPRINT="REPLACE_VERIFY_FROM_MS_DOCS"
KEY_1_OUT="etc/apt/keyrings/microsoft.gpg"
