# kernel-rolling — newest Linux kernel from trixie-backports, auto-tracked.
#
# Why this exists: Debian backports rolls its kernel forward and DROPS
# older point-releases from the archive (it keeps only the latest ABI).
# The old kernel-6-18 profile pinned an exact package name
# (linux-image-6.18.15+deb13-amd64); once backports moved on, that exact
# package vanished, apt could no longer install it, and the build ended
# with "A bootable image was requested but no kernel was found".
#
# The fix: install the linux-image-<arch> *meta-package* (same approach
# as kernel-lts) but pin the kernel stack to trixie-backports via
# preferences.d/kernel-rolling.pref. The meta-package always resolves to
# whatever the newest backports kernel currently is (7.0.x today, 7.x
# tomorrow), so this profile never goes stale.
#
# Architecture is selected by [Match] in mkosi.conf.d/10-*.conf, so the
# same profile name works for amd64 and arm64.
#
# Trade-off: the kernel floats against LIVE backports rather than the
# pinned snapshot mirror, so kernel version is intentionally NOT
# reproducible. That's the point — "give me the newest supported kernel".
# A host that needs a SPECIFIC kernel (e.g. a driver that breaks on newer
# releases) should pin it in its own hardware profile instead — see
# mkosi.profiles/macbook/mkosi.conf, which pins the T2 kernel because the
# CS8409 audio driver regresses on 7.0.x.
#
# Secure Boot: unaffected. mkosi wraps whatever kernel this installs in a
# UKI and signs it with the host's .secureboot key (see
# mkosi.conf.d/25-native-uki.conf and the 30-secure-boot.conf the host
# descriptor generates), and Debian-signed in-tree modules load under
# lockdown regardless of kernel version.
