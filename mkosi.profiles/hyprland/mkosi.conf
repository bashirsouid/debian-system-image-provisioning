[Content]
CleanPackageMetadata=no
Packages=
    xorg
    # xserver-xorg-legacy ships /usr/lib/xorg/Xorg.wrap (the setuid root
    # wrapper) and lets non-root users start X on a VT they don't own.
    # Without it, `startx` as a regular user dies with
    #   xf86OpenConsole: Cannot open virtual console 1 (Permission denied)
    # because /dev/tty1 is mode 0600 root:root and the unwrapped Xorg
    # binary cannot KDSETMODE the console. Pair this with the
    # /etc/X11/Xwrapper.config dropped under mkosi.extra/.
    xserver-xorg-legacy
    xinit
    xterm
    hyprland
    wayland-protocols
    # Hyprland dependencies
    libhyprland
    libhyprland-dev
    libwlroots
    libwlroots-dev
    # Wayland utilities
    wayland-protocols
    wayland-utils
    # Terminal and applications
    kitty
    alacritty
    foot
    # Utilities
    brightnessctl
    brightness-udev
    rofi-wayland
    wofi
    bemenu
    # File managers
    thunar
    pcmanfm
    # System tools
    htop
    neofetch
    # Editors
    vim
    nano
    # Browsers
    firefox-esr
    chromium
    # Media
    vlc
    mpv
    # Office
    abiword
    gnumeric
    # Graphics
    grim
    slurp
    wl-clipboard
    swappy
    # Audio
    pipewire
    pipewire-audio
    pipewire-pulse
    # Bluetooth
    bluez
    blueman
    # Network
    network-manager
    # Fonts
    fonts-noto
    fonts-noto-color-emoji
    # Themes and icons
    gtk-theme-config
    # Development tools
    build-essential
    cmake
    pkg-config
    git

BuildPackages=
    build-essential
    cmake
    meson
    ninja-build
    pkg-config
    libhyprland-dev
    libwlroots-dev
    wayland-protocols
    libcairo2-dev
    libdbus-1-dev
    libgdk-pixbuf-2.0-dev
    libglib2.0-dev
    libpango1.0-dev
    libstartup-notification0-dev
    libx11-dev
    libx11-xcb-dev
    libxcb-composite0-dev
    libxcb-ewmh-dev
    libxcb-icccm4-dev
    libxcb-image0-dev
    libxcb-randr0-dev
    libxcb-util0-dev
    libxcb-xfixes0-dev
    libxcb-xinerama0-dev
    libxcb-xkb-dev
    libxcb-xrm-dev
    libxcb-xtest0-dev
    x11proto-dev
    libinput-dev
    libxcb-damage0-dev
    libxcb-xfixes0-dev
    libxcb-shape0-dev
    libxcb-render-util0-dev
    libxcb-render0-dev
    libxcb-randr0-dev
    libxcb-xinerama0-dev
    libxcb-xkb-dev
    libxcb-xrm-dev
    libxcb-xtest0-dev
