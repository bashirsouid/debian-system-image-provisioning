# debian-backports — shared base that enables the trixie-backports apt suite.
#
# Repo-only base profile: ships ONLY
# mkosi.extra/etc/apt/sources.list.d/trixie-backports.sources (signed by the
# standard debian-archive-keyring already present in the image). It installs no
# packages and pins nothing — each consumer adds its own preferences.d pin for
# the specific backports packages it wants (e.g. kernel-rolling pins the kernel
# stack, thinkpad-x1g13 pins firmware).
#
# Pulled in automatically via `requires=debian-backports` by the profiles that
# need backports; not selected directly.
#
# IMPORTANT: do not add a bare "Packages=" line here. An empty list assignment
# RESETS mkosi's accumulated package list and wipes every other profile's
# packages (symptom: tiny image, "no kernel was found"). A repo-only profile
# needs no [Content] Packages= at all.
