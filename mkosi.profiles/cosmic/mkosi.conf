[Content]
CleanPackageMetadata=no
Packages=
    # ── Wayland infrastructure ──────────────────────────────────────────
    # These provide the compositor plumbing that COSMIC (and any Wayland
    # DE) needs.  They are safe to install now and carry no desktop-
    # environment opinion of their own.
    wayland-protocols
    libwayland-client0
    libseat1
    libxkbcommon0
    libinput10
    xwayland
    # ── Session / desktop glue ──────────────────────────────────────────
    dbus
    dbus-user-session
    polkitd
    accountsservice
    # ── XDG desktop portals ─────────────────────────────────────────────
    # xdg-desktop-portal-cosmic is not yet packaged for Debian; use the
    # GTK portal as a functional fallback until it is.
    xdg-desktop-portal
    xdg-desktop-portal-gtk
    # ── Desktop utilities ───────────────────────────────────────────────
    kitty
    nautilus
    evince
    # ── COSMIC desktop environment ──────────────────────────────────────
    # COSMIC is NOT in Debian's official repositories (Trixie or Sid).
    # The packages below are placeholders — uncomment them once a
    # package source is established (third-party repo, local .deb build,
    # or PPA).  See README.md in this profile directory for options.
    #
    # TODO: add apt-keys.conf + sources.list entry once a repo is chosen
    #
    # cosmic-session
    # cosmic-comp
    # cosmic-panel
    # cosmic-applets
    # cosmic-settings
    # cosmic-settings-daemon
    # cosmic-bg
    # cosmic-launcher
    # cosmic-files
    # cosmic-edit
    # cosmic-term
    # cosmic-notifications
    # cosmic-osd
    # cosmic-greeter
    # cosmic-icons
    # cosmic-store
    # cosmic-screenshot
    # cosmic-idle
    # cosmic-workspaces
    # cosmic-randr
    # xdg-desktop-portal-cosmic
