[Content]
# Kernel 6.18 profile from Debian trixie-backports.
# This profile installs the latest 6.18.x kernel (currently 6.18.15) and
# removes the default kernel-amd64 meta package to avoid conflicts.
#
# Prerequisites: The host must have trixie-backports configured in
# mkosi.extra/etc/apt/sources.list.d/trixie-backports.sources (x1g13 has this).

Packages=
    linux-image-6.18.15+deb13-amd64
    linux-headers-6.18.15+deb13-amd64
    linux-headers-6.18.15+deb13-common

RemovePackages=
    linux-image-amd64
    linux-headers-amd64