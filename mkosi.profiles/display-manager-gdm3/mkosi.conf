[Content]
CleanPackageMetadata=no
Packages=
    # GNOME Display Manager - supports both X11 and Wayland sessions
    gdm3
    # GNOME session components needed for proper session management
    gnome-session
    gnome-session-bin
    gnome-session-common
    # GNOME settings daemon for managing settings
    gnome-settings-daemon
    # Polkit for authorization
    polkitd
    # Account service for user management
    accountsservice
    # Required for display manager functionality
    dbus
    dbus-user-session
    # Console kit for session tracking (fallback)
    console-kit-daemon
    # X11 utilities
    x11-xserver-utils
    xinit
    xterm
    # Fallback options
    slim

BuildPackages=
    # Build dependencies if needed
    pkg-config
