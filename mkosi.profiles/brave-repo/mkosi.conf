# brave-repo — shared base for Brave's apt repository.
#
# Repo-only base profile: ships the Brave apt source + signing key. Installs no
# packages — consumers add their own Brave package (brave-browser installs
# `brave-browser`, brave-origin installs `brave-origin`) from this same repo.
#
# Pulled in automatically via `requires=brave-repo`; not selected directly.
#
# IMPORTANT: do not add a bare "Packages=" line here — an empty list assignment
# RESETS mkosi's accumulated package list (see mkosi.profiles/README.md).
