[Content]
# Macbook = T2 hardware profile. Kernel + firmware + initramfs modules
# for Intel-based MacBooks with the Apple T2 security chip. Does NOT
# pull in X, awesome, audio, etc. — compose with:
#   macbook awesomewm dev-tools audio-pipewire wifi ssh-server ...
# or a role.
CleanPackageMetadata=no
Packages=
    kmod
    # T2 kernel PINNED to 6.18.35. This was the floating `linux-t2`
    # metapackage, which always tracks the newest t2 kernel and pulled in
    # 7.0.12 — on which the CS8409 audio driver
    # (third-party/snd_hda_macbookpro, built in mkosi.finalize) fails to
    # compile. The whole 7.0 series is upstream-flagged as broken for this
    # driver even when it builds: davidjo/snd_hda_macbookpro#176 ("linux 7.0
    # kernel - driver builds but does not work at all") and #186 (7.0.9
    # works, 7.0.10+ regress). 6.18 is the LTS-style line the driver is
    # reliable on (and the line the kernel-6-18 profile already uses).
    #
    # To bump: pick a newer version the CS8409 driver still builds against
    # from the t2-ubuntu-repo "trixie" release and change ONLY this line —
    # headers are installed by detected kernel version in mkosi.finalize /
    # mkosi.build, and the CS8409 build auto-detects the installed t2 kernel.
    linux-image-6.18.35-1-t2-trixie
    # initramfs-tools is normally pulled in by the t2 kernel transitively, but
    # mkosi.finalize re-runs `update-initramfs -u -k all` so the modules in
    # /etc/initramfs-tools/modules from ExtraTrees= (apple_bce, apple_ib_*,
    # appletb) actually land in the initrd. Listing it explicitly makes that
    # contract obvious and ensures `update-initramfs` and `lsinitramfs` are
    # present even if the kernel package's depends ever change.
    initramfs-tools
    apple-t2-audio-config
    apple-firmware
    # Generic non-free firmware that apple-firmware does NOT ship and the
    # kernel asks for during early boot. Without these, dmesg fills with
    # "Direct firmware load for X failed with error -2" lines:
    #   firmware-brcm80211    - brcm/brcmfmac4350c2-pcie.bin (BCM4364 WiFi)
    #                           + brcm/BCM*.hcd (Bluetooth firmware patch)
    #   firmware-misc-nonfree - i915/kbl_dmc_ver1_04.bin (Intel display
    #                           microcode for power management)
    firmware-brcm80211
    firmware-misc-nonfree
    brightnessctl
    brightness-udev
    # dkms is needed in the final image for mkosi.finalize to build and
    # install the CS8409 DKMS module (snd_hda_macbookpro) at image build time.
    dkms
    # t2fanrd is intentionally NOT listed here; mkosi.finalize installs
    # it manually via `dpkg-deb -x`. Reason: the upstream t2fanrd
    # package's postinst runs `systemctl enable --now t2fanrd.service`,
    # whose `--now` half tries to actually start the service inside
    # mkosi's build sandbox — that fails (no PID1 to talk to), the
    # postinst exits non-zero, and dpkg aborts the whole apt-get with
    # "Errors were encountered while processing: t2fanrd". apt/dpkg
    # have no flag to ignore postinst failures, so the only escape is
    # to skip the postinst by extracting the .deb manually. See the
    # corresponding hunk in mkosi.finalize.

BuildPackages=
    # The CS8409 DKMS driver (third-party/snd_hda_macbookpro) is built
    # during the image assembly and needs the standard Debian build
    # toolchain + xz for unpacking kernel-headers.
    build-essential
    patch
    wget
    openssl
    ca-certificates
    xz-utils
    # git is needed at build time to clone kekrby/t2-better-audio in
    # mkosi.finalize. That repo provides UCM2 + PipeWire DSP configs for
    # T2 speaker/headphone routing. git is only a BuildPackage (build-time
    # only) and is not present in the final image.
    git

[Build]
# WithNetwork must live in [Build] (not [Content]) on mkosi >=24, otherwise
# mkosi prints "Setting WithNetwork should be configured in [Build], not
# [Content]" and the setting is silently ignored — which then breaks the
# t2linux apt-repo fetch and the CS8409 DKMS build that needs to download
# `linux-headers-$kernel` mid-build.
WithNetwork=yes

[Runtime]
KernelCommandLineExtra=video=1280x720
