# T2 MacBook Pro 13" 2019 — lid close behaviour
#
# HandleLidSwitch=suspend          — suspend on lid close even when on AC power.
#                                    Default is also suspend, but making it
#                                    explicit ensures no other drop-in overrides it.
# HandleLidSwitchExternalPower=suspend — same when plugged in. Without this,
#                                    some systemd versions default to `ignore`
#                                    on AC, which is why the lid-close suspend
#                                    stops working when the charger is connected.
# HoldoffTimeoutSec=0              — after resume, react to lid events immediately.
#                                    Default is 30s. During that window a quick
#                                    close-after-wake drops the lid event entirely,
#                                    which is the "accidental wake" root cause on T2.
# LidSwitchIgnoreInhibited=no      — respect any inhibitor locks (e.g. a running
#                                    video call holding a sleep inhibitor).
[Login]
HandleLidSwitch=suspend
HandleLidSwitchExternalPower=suspend
HoldoffTimeoutSec=0
LidSwitchIgnoreInhibited=no
