[Content]
# k3s = single-node Kubernetes via Rancher's get.k3s.io install script,
# run as a first-boot oneshot (mkosi.extra/etc/systemd/system/k3s-install.service).
# The script downloads the k3s binary + writes /etc/systemd/system/k3s.service,
# so the node is up after the first successful boot with network.
#
# k3s ships its own bundled iptables/nftables/conntrack/runc, so the
# only host-side requirements are:
#   - curl + ca-certificates (download the install script + binary)
#   - iptables (k3s defaults to iptables-legacy mode; nftables also
#     present in case the user picks --flannel-backend=none and brings
#     their own CNI)
Packages=
    curl
    ca-certificates
    iptables
    nftables
    conntrack
