[Content]
CleanPackageMetadata=no
Packages=
    xorg
    # xserver-xorg-legacy ships /usr/lib/xorg/Xorg.wrap (the setuid root
    # wrapper) and lets non-root users start X on a VT they don't own.
    # Without it, `startx` as a regular user dies with
    #   xf86OpenConsole: Cannot open virtual console 1 (Permission denied)
    # because /dev/tty1 is mode 0600 root:root and the unwrapped Xorg
    # binary cannot KDSETMODE the console. Pair this with the
    # /etc/X11/Xwrapper.config dropped under mkosi.extra/.
    xserver-xorg-legacy
    xinit
    xterm
    awesome
    lua5.3
    liblua5.3-0
    liblua5.3-dev
    lua-lgi
    dbus-x11
    xauth
    picom

BuildPackages=
    build-essential
    cmake
    imagemagick
    pkg-config
    lua5.3
    libcairo2-dev
    libdbus-1-dev
    libgdk-pixbuf-2.0-dev
    libglib2.0-dev
    libpango1.0-dev
    libstartup-notification0-dev
    libx11-xcb-dev
    libxdg-basedir-dev
    libxkbcommon-dev
    libxkbcommon-x11-dev
    libxcb1-dev
    libxcb-cursor-dev
    libxcb-icccm4-dev
    libxcb-keysyms1-dev
    libxcb-randr0-dev
    libxcb-shape0-dev
    libxcb-util-dev
    libxcb-xinerama0-dev
    libxcb-xkb-dev
    libxcb-xrm-dev
    libxcb-xtest0-dev
    libxcb-xfixes0-dev
    x11proto-dev
