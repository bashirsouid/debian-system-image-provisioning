[Content]
CleanPackageMetadata=no
Packages=
    xorg
    # xserver-xorg-legacy ships /usr/lib/xorg/Xorg.wrap (the setuid root
    # wrapper) and lets non-root users start X on a VT they don't own.
    # Without it, `startx` as a regular user dies with
    #   xf86OpenConsole: Cannot open virtual console 1 (Permission denied)
    # because /dev/tty1 is mode 0600 root:root and the unwrapped Xorg
    # binary cannot KDSETMODE the console. Pair this with the
    # /etc/X11/Xwrapper.config dropped under mkosi.extra/.
    xserver-xorg-legacy
    xinit
    xterm
    awesome
    lua5.3
    liblua5.3-0
    liblua5.3-dev
    lua-lgi
    # vicious is shipped as a system-wide overlay by mkosi.build's
    # install_vicious_lib (sourced from third-party/vicious, fetched by
    # update-3rd-party-deps.sh). Debian Trixie no longer packages it.
    # Do NOT add `vicious` here — the closest apt-name match is
    # `sipvicious`, a SIP penetration-testing scanner with nothing in
    # common with the awesome widget library.
    # SVG rendering for awesome themes and icon assets.
    # gir1.2-rsvg-2.0 ships the GObject Introspection typelib that
    # lua-lgi binds at runtime; without it, `require("lgi").Rsvg` and
    # any beautiful theme element backed by an SVG silently fail.
    # librsvg2-common ships the gdk-pixbuf SVG loader so awesome's
    # gdk-pixbuf-based image paths can decode *.svg too.
    gir1.2-rsvg-2.0
    librsvg2-common
    dbus-x11
    xauth
    picom
    kitty
    firefox-esr
    chromium
    abiword #todo: move to office suite
    gnumeric
    mousepad
    thunar
    vlc # TODO: move to media suite

BuildPackages=
    build-essential
    cmake
    imagemagick
    pkg-config
    lua5.3
    libcairo2-dev
    libdbus-1-dev
    libgdk-pixbuf-2.0-dev
    libglib2.0-dev
    libpango1.0-dev
    libstartup-notification0-dev
    libx11-xcb-dev
    libxdg-basedir-dev
    libxkbcommon-dev
    libxkbcommon-x11-dev
    libxcb1-dev
    libxcb-cursor-dev
    libxcb-icccm4-dev
    libxcb-keysyms1-dev
    libxcb-randr0-dev
    libxcb-shape0-dev
    libxcb-util-dev
    libxcb-xinerama0-dev
    libxcb-xkb-dev
    libxcb-xrm-dev
    libxcb-xtest0-dev
    libxcb-xfixes0-dev
    x11proto-dev
