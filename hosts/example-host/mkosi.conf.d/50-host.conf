# Template drop-in for a new host.
#
# IMPORTANT: the [Match] stanza is what prevents this config from
# leaking into every profile when someone builds with --host <you>.
# Without it, `./build.sh --profile server --host example-host` would
# still try to install firmware-linux onto a headless server image.
# Copy the [Match] block below and set it to the profile(s) that this
# host's extras should apply to.
#
# Multiple values are comma-separated: `Profiles=devbox,macbook`.
# If the host really is profile-agnostic (rare), drop the [Match] block
# and accept that this will apply to every profile.

[Match]
Profiles=devbox

[Content]
Packages=
    firmware-linux
