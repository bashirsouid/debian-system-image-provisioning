# Secure Boot opt-in for evox2.
#
# This host is an Intel x86-64 workstation with standard UEFI + Secure
# Boot support. Enabling SB here means mkosi signs the UKI with the
# key in .secureboot/db.key, and the firmware verifies the signature
# against db.crt (enrolled in UEFI setup) before jumping to the
# kernel. Combined with the existing systemd-boot boot-counting +
# sysupdate flow, this closes the main "attacker modifies the UKI in
# ESP" gap.
#
# Prerequisites:
#   1. Run ./bin/generate-secureboot-keys.sh once.
#   2. Enroll .secureboot/db.crt into evox2's UEFI. See docs/secure-boot.md.
#   3. Rebuild with ./build.sh --host evox2.
#
# If the key material is missing at build time mkosi will fail loudly
# rather than silently producing an unsigned image, which is the
# behavior we want.

[Validation]
SecureBoot=yes
SecureBootKey=.secureboot/db.key
SecureBootCertificate=.secureboot/db.crt
