# T2 MacBook quirks — silence noise that can't be fixed in software.
#
# pcspkr: gets autoloaded twice on T2 hardware (once via the i8042 alias from
# initrd, once via the input subsystem on the real root). The second load
# always logs `Error: Driver 'pcspkr' is already registered, aborting...`
# even though the device is otherwise fine. We blacklist it because there's
# no real PC speaker on a MacBook to begin with — the T2 owns audio.
blacklist pcspkr
install pcspkr /bin/true

# iTCO_wdt: Intel TCO watchdog. On T2 Macs, Apple's firmware claims the
# watchdog and refuses to release it, so the module logs
# `iTCO_wdt: unable to reset NO_REBOOT flag, device disabled by hardware/BIOS`
# and then the device sits there doing nothing. Don't load it.
blacklist iTCO_wdt
install iTCO_wdt /bin/true

# applesmc: kernel's generic Apple SMC driver fights with t2fanrd for fan
# control on T2 Macs. t2fanrd is what the t2linux track ships and expects.
# Block applesmc to avoid the conflict + the cosmetic load failure.
blacklist applesmc
install applesmc /bin/true

# Force the in-kernel CS8409 codec out so the DKMS-built
# snd-hda-codec-cs8409 from snd_hda_macbookpro takes its place.
# The in-kernel version lacks the Apple-specific patches required
# for AppleT2xN to appear in /proc/asound/cards.
blacklist snd-hda-codec-cs8409
install snd-hda-codec-cs8409 /bin/true
