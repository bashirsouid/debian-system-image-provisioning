[Match]
Profiles=macbook

[Content]
Packages=
    linux-t2
    # initramfs-tools is normally pulled in by linux-t2 transitively, but
    # mkosi.finalize re-runs `update-initramfs -u -k all` so the modules in
    # /etc/initramfs-tools/modules from ExtraTrees= (apple_bce, apple_ib_*,
    # appletb) actually land in the initrd. Listing it explicitly makes that
    # contract obvious and ensures `update-initramfs` and `lsinitramfs` are
    # present even if the kernel package's depends ever change.
    initramfs-tools
    apple-t2-audio-config
    apple-firmware
    # Generic non-free firmware that apple-firmware does NOT ship and the
    # kernel asks for during early boot. Without these, dmesg fills with
    # "Direct firmware load for X failed with error -2" lines and userspace
    # services that need the network (tailscale, cloudflared, ab-heartbeat)
    # spam reconnection failures forever:
    #   firmware-brcm80211   - brcm/brcmfmac4350c2-pcie.bin (BCM4364 WiFi)
    #                          + brcm/BCM*.hcd (Bluetooth firmware patch)
    #   firmware-misc-nonfree - i915/kbl_dmc_ver1_04.bin (Intel display
    #                          microcode for power management)
    #   wireless-regdb       - regulatory.db (cfg80211 country/channel rules)
    firmware-brcm80211
    firmware-misc-nonfree
    wireless-regdb
    t2fanrd
    network-manager
    network-manager-iwd
    bluez
    pipewire-audio
    pipewire-pulse
    wireplumber
    libspa-0.2-bluetooth
    rtkit
    alsa-utils
    pavucontrol
BuildPackages=
    dkms
    build-essential
    patch
    wget

[Build]
# WithNetwork must live in [Build] (not [Content]) on mkosi >=24, otherwise
# mkosi prints "Setting WithNetwork should be configured in [Build], not
# [Content]" and the setting is silently ignored — which then breaks the
# t2linux apt-repo fetch and the CS8409 DKMS build that needs to download
# `linux-headers-$kernel` mid-build.
WithNetwork=yes
