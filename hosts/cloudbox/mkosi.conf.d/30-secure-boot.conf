# Secure Boot opt-in for cloudbox (Oracle ARM).
#
# Oracle Cloud Ampere A1 instances support UEFI Secure Boot, but
# enrollment is done through the cloud console / OCI CLI at instance
# launch ("Shielded Instance" options), not through a local BIOS menu.
# For existing instances, Secure Boot can be toggled via instance
# shielded-configuration updates.
#
# Prerequisites:
#   1. Run ./scripts/generate-secureboot-keys.sh on the build host.
#   2. Convert .secureboot/db.crt to the format Oracle expects (DER)
#      and upload it as a custom Secure Boot key. See docs/secure-boot.md.
#   3. Relaunch (or reconfigure) the instance with Secure Boot enabled
#      and your custom db key enrolled.
#   4. Rebuild with ./build.sh --host cloudbox.
#
# If you're running on a different ARM cloud or a bare-metal board,
# check the vendor docs before enabling this — some ARM firmwares do
# not implement the UEFI Secure Boot chain at all.

[Validation]
SecureBoot=yes
SecureBootKey=.secureboot/db.key
SecureBootCertificate=.secureboot/db.crt
