# mkosi.conf.d/15-reproducibility.conf
#
# Makes builds reproducible by pinning the Debian mirror to a specific
# snapshot.debian.org timestamp. Bump this date deliberately when you
# want to pull in new security updates; do not leave it open-ended.
#
# How to pick a date:
#   1. Look at https://security-tracker.debian.org/tracker/status/release/stable
#      for the most recent significant security advisory you care about.
#   2. Pick a timestamp from https://snapshot.debian.org/archive/debian/
#      slightly after that date.
#   3. Update both lines below and commit.
#
# You can also set Mirror= from the environment to override on a
# per-build basis without editing this file:
#   MKOSI_MIRROR=https://deb.debian.org/debian ./build.sh ...
#
# Reference: https://www.debian.org/doc/manuals/securing-debian-manual/upgrading-debian.html

[Distribution]
# Snapshot at an explicit point in time. Bump deliberately.
# Format: https://snapshot.debian.org/archive/debian/YYYYMMDDTHHMMSSZ/
Mirror=https://snapshot.debian.org/archive/debian/20260401T000000Z/

[Build]
# Timestamp used for reproducibility (file mtimes, tar headers, etc.)
# Set it to match the snapshot above.
Environment=SOURCE_DATE_EPOCH=1772496000

# The Output= setting is intentionally unset here. build.sh passes
# --image-id=<base>-<profile>[-<host>] and --image-version=<ts> to mkosi,
# and mkosi derives the output filename from those two when Output= is
# not pinned. Pinning Output=debian-provisioning used to strip the
# version suffix AND force every profile's artifacts into the same file
# name, which silently clobbered older builds when you rebuilt with a
# different profile. See the rationale in build.sh:image_id_for_target().
