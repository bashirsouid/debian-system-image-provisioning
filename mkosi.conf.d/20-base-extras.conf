# Base extras applied to every build regardless of profile.
#
# Anything profile-specific (openssh-server, tailscale, cloudflared,
# etc.) has been moved to its own mkosi.profiles/<name>/mkosi.conf and
# is only pulled in when that profile is selected. See
# mkosi.profiles/README.md for the layering rules.

[Distribution]
# Enable the Debian non-free archive sections. Several profiles pull
# firmware packages (firmware-brcm80211, firmware-misc-nonfree,
# wireless-regdb, etc.) that live in non-free-firmware. Keeping this in
# a base config means "I added the wifi profile" just works without
# also needing to remember to enable non-free-firmware.
Repositories=
        contrib
        non-free
        non-free-firmware

[Content]
ExtraTrees=mkosi.extra
Packages=
        # Universal CLI dependencies used by many base scripts
        # (ab-monitor, ab-health-check.d/*, systemd credentials, etc.).
        jq
        curl
        ca-certificates
        iproute2
