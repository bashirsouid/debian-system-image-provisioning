# mkosi.conf.d/10-caching.conf
#
# mkosi has three layers of caching. Getting all three set up saves a
# LOT of time on rebuilds, especially when the apt package list has
# not changed.
#
#   PackageCacheDirectory=  -> caches downloaded *.deb files before unpack.
#                              In mkosi v21+ this is SEPARATE from
#                              CacheDirectory=. If you only set
#                              CacheDirectory= (like older docs suggest),
#                              the package download cache goes to
#                              $XDG_CACHE_HOME and silently does not
#                              persist across environments.
#                              This is the cache you want for "stop
#                              re-downloading 800MB of debs every time".
#
#   CacheDirectory=         -> stores incremental snapshots of the rootfs
#                              after packages are unpacked but before
#                              build scripts run. Bypasses the slow
#                              unpack step on rebuild. Keyed on
#                              distro + release + arch — NOT on the
#                              resolved package list. See the GOTCHA below.
#
#   BuildDirectory=         -> persistent scratch for mkosi.build, used
#                              by ccache / meson / cmake so AwesomeWM
#                              (and t2 audio driver) don't recompile
#                              from zero on every build.
#
# All three caches are SAFE to keep between builds:
#   * packages are crypto-signed by Debian, mkosi verifies signatures
#     on every install regardless of cache state
#   * mkosi partitions the package cache internally by
#     (distribution, release, architecture), so amd64 (devbox) and
#     arm64 (cloudbox) builds coexist in the same PackageCacheDirectory
#     without interfering. Cross-arch builds on an Intel host just
#     mean the arm64 subtree starts empty on first cloudbox build;
#     subsequent cloudbox rebuilds reuse it.
#
# GOTCHA — incremental cache does NOT track package/profile changes.
# The CacheDirectory snapshot is reused whenever distro+release+arch
# match; it is NOT invalidated when you add/remove a profile or change a
# profile's Packages=. A plain rebuild (no force, or a single `-f`) will
# happily restore the OLD cached rootfs and skip apt entirely, so your
# package change appears to do nothing — the tell is a build log that
# shows "Copying cached trees" with no package-install step, and an
# unexpectedly tiny rootfs / "no kernel was found".
#
# After editing any profile's package set (or hosts.local/<host>.conf
# profile list), you MUST clear the incremental cache so apt re-runs:
#
#   ./build.sh --host <host> --clean   # maps to `mkosi -f -f`; rebuilds
#                                      # the cached rootfs (re-runs apt)
#
# A single `--force` (`mkosi -f`) is NOT enough — it only removes the
# output image and still restores the cached rootfs. Use --clean.
#
# To force a fully fresh rebuild (all caches cleared):
#   ./build.sh --host <host> --clean   # clears the incremental rootfs cache
#   rm -rf mkosi.pkgcache              # also drop the downloaded *.deb cache

[Build]
Incremental=yes
History=yes
CacheDirectory=mkosi.cache
PackageCacheDirectory=mkosi.pkgcache
BuildDirectory=mkosi.builddir
WorkspaceDirectory=../.mkosi.workspace
