# Adds the packages and repos needed for the Tailscale + cloudflared +
# hardware-backed-SSH path. Drop into mkosi.conf.d/ at the repo root.
#
# This config intentionally does NOT add any secrets. Secrets are
# staged in .mkosi-secrets/ on the build host and are encrypted into
# /etc/credstore.encrypted/ by scripts/package-credentials.sh before
# the actual mkosi build runs.

[Distribution]
# Tailscale publishes a Debian repo; mkosi can consume it via the
# standard mkosi.sources.d mechanism. See
# docs/remote-access.md for the exact signed-by line, because the
# signing key rotates and should come from the host or from an
# ExtraTrees snapshot committed to the repo under mkosi.extra.
Repositories=
        contrib
        non-free
        non-free-firmware

[Content]
Packages=
        openssh-server
        libpam-u2f
        pamu2fcfg
        # cloudflared is not in Debian main; it is installed from the
        # Cloudflare apt repo that gets configured as an ExtraTree
        # under mkosi.extra/etc/apt/sources.list.d/ and whose signing
        # key is committed under mkosi.extra/etc/apt/keyrings/.
        cloudflared
        tailscale
        jq
        curl
        ca-certificates
        iproute2
