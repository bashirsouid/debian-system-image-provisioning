# mkosi.conf.d/25-native-uki.conf
#
# The sysupdate-based update path in this repo depends on a Unified
# Kernel Image. Two pieces need it:
#
#   * mkosi.sysupdate/60-uki.transfer installs a versioned
#     <image>_<ver>_<arch>.efi into /EFI/Linux on the booted system.
#   * scripts/export-sysupdate-artifacts.sh, which runs right after
#     `mkosi build`, searches the build folder for a standalone *.efi
#     file to copy into that versioned artifact name.
#
# Without UKI generation enabled, mkosi falls through to Type 1 BLS
# entries only, no UKI is written into the image *or* as a split
# artifact, and the export step dies with:
#     ERROR: unable to locate split-out UKI for image '<id>' ...
# That failure happens after the disk image is written but before
# build.sh can stage the per-build folder under mkosi.output/builds/
# and write its build.env, so every downstream tool that resolves a
# build through that folder (write-live-test-usb.sh, test-rollback.sh,
# run.sh) then fails with "no build found" even though the .raw image
# is sitting right there.
#
# UnifiedKernelImages=yes forces UKI generation and fails loudly if
# systemd-ukify is missing, rather than silently falling back to BLS
# and reproducing the original failure mode. systemd-ukify is added
# to Packages= so it is present inside the image mkosi chroots into
# while building the UKI. SplitArtifacts=uki makes mkosi copy the
# generated UKI out of the image into <outputdir>/<o>.efi next to
# the .raw image, which is where the export script looks.
#
# Note on signing: mkosi only signs the UKI when [Validation] has
# SecureBoot=yes plus a usable SecureBootKey/SecureBootCertificate.
# The base mkosi.conf in this repo sets SecureBoot=no; hosts that
# want a signed UKI opt in via hosts/<host>/mkosi.conf.d/30-secure-boot.conf.
# So UnifiedKernelImages=yes here produces an unsigned UKI by default,
# and a signed one for hosts that have set up Secure Boot keys —
# without this drop-in needing to know which is which.

[Content]
UnifiedKernelImages=yes
Packages=
        systemd-ukify

[Output]
SplitArtifacts=uki
