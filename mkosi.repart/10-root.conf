[Partition]
Type=root
Format=ext4
CopyFiles=/
# Size the BUILD image to each host's ACTUAL content (Minimize), not a fixed
# size. Hosts vary widely in installed content — a server is a few GB; a full
# desktop host (steam, chromium, vscode, digikam, ...) is much larger — so no
# single fixed size fits them all; Minimize adapts per host. The A/B root is
# also kept lean by design: bulk mutable state lives off-root on persistent
# storage (docker/k3s -> /mnt/data via the symlink-* profiles, /home on its own
# GPT partition) so it survives A/B swaps, and the journal is size-capped.
#
# Why small matters for the build: the root is LUKS-encrypted and an encrypted
# partition can't be sparse, so a fixed 15-30G image wrote 15-30G of real bytes
# and bloated build scratch, causing systemd-repart "No space left on device".
# Minimize sizes each image to ~its content, keeping builds and scratch small.
# The deployed root is grown to fill its slot at boot by ab-grow-root.service.
# See docs/home-storage.md.
Minimize=guess
# Sanity ceiling only, matched to the largest deploy slot (deploy.repart root
# SizeMaxBytes=50G): refuse to build a root image too big to fit any slot.
SizeMaxBytes=50G
Encrypt=key-file
