# mkosi.repart/10-root.conf
#
# Root partition for the built image.raw. Uses the x86-64 Linux root
# partition type GUID so systemd-gpt-auto-generator can find and mount
# it without an fstab. On ARM64 builds, mkosi substitutes the right
# GUID automatically when Architecture=arm64 is set.
#
# Size: leave auto so mkosi computes from installed content. Add
# ~200M headroom for first-boot state.

[Partition]
Type=root
Format=ext4
CopyFiles=/
Minimize=guess
SizeMinBytes=2G
