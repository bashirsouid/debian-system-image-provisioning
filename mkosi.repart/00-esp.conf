# mkosi.repart/00-esp.conf
#
# Partition layout that systemd-repart applies when mkosi BUILDS the
# image.raw itself. This is different from deploy.repart/ which describes
# the layout for the bootstrap target disk.
#
# The built image.raw is what you boot in QEMU with `./run.sh`, and
# what `scripts/write-live-test-usb.sh` writes to a USB for hardware
# smoke testing. It has a simple 2-partition layout: ESP + single root.
#
# The retained-version A/B layout (two root partitions) is created
# separately by bootstrap-ab-disk.sh using deploy.repart/. Do not
# conflate the two: trying to ship an image.raw that is already
# pre-partitioned as A/B would break the sysupdate install path.

[Partition]
Type=esp
Format=vfat
CopyFiles=/boot:/
SizeMinBytes=256M
SizeMaxBytes=512M
