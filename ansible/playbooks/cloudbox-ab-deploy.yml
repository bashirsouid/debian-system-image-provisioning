---
- name: Build and bootstrap/update the ARM64 cloudbox native sysupdate path
  hosts: cloudbox
  become: true
  gather_facts: true

  vars:
    project_root: "{{ playbook_dir }}/../.."
    local_bundle: "/tmp/debian-system-image-provisioning-cloudbox.tar.gz"
    remote_bundle: "/tmp/debian-system-image-provisioning-cloudbox.tar.gz"
    remote_project_root: "{{ remote_project_root | default('/opt/debian-system-image-provisioning') }}"
    build_profile: "{{ build_profile | default('server') }}"
    build_host_overlay: "{{ build_host_overlay | default('cloudbox') }}"
    cloudbox_bootstrap_target: "{{ cloudbox_bootstrap_target | default('') }}"
    cloudbox_bootstrap_mode: "{{ (cloudbox_bootstrap_target | default('') | length) > 0 }}"

  pre_tasks:
    - name: Assert the target host is ARM64
      ansible.builtin.assert:
        that:
          - ansible_architecture in ['aarch64', 'arm64']
        fail_msg: "This playbook is intended for an ARM64/aarch64 cloudbox target."

    - name: Install build and deploy prerequisites
      ansible.builtin.apt:
        update_cache: true
        name:
          - ca-certificates
          - curl
          - dosfstools
          - fdisk
          - git
          - jq
          - kmod
          - mkosi
          - openssl
          - python3
          - rsync
          - systemd
          - systemd-boot-efi
          - systemd-boot-tools
          - systemd-container
          - systemd-repart
          - util-linux
        state: present

    - name: Build a local source bundle on the controller
      delegate_to: localhost
      become: false
      ansible.builtin.command:
        argv:
          - tar
          - --exclude=.git
          - --exclude=mkosi.output
          - --exclude=mkosi.cache
          - --exclude=mkosi.builddir
          - --exclude=.mkosi-secrets
          - --exclude=.mkosi-thirdparty
          - -C
          - "{{ project_root }}"
          - -czf
          - "{{ local_bundle }}"
          - .

  tasks:
    - name: Reset remote project checkout
      ansible.builtin.file:
        path: "{{ remote_project_root }}"
        state: absent

    - name: Create remote project directory
      ansible.builtin.file:
        path: "{{ remote_project_root }}"
        state: directory
        mode: '0755'

    - name: Copy source bundle to the target
      ansible.builtin.copy:
        src: "{{ local_bundle }}"
        dest: "{{ remote_bundle }}"
        mode: '0644'

    - name: Unpack the source bundle on the target
      ansible.builtin.unarchive:
        src: "{{ remote_bundle }}"
        dest: "{{ remote_project_root }}"
        remote_src: true

    - name: Render cloudbox users.json
      ansible.builtin.template:
        src: ../templates/users.json.j2
        dest: "{{ remote_project_root }}/.users.json"
        mode: '0600'

    - name: Write cloudbox host-specific kernel command line
      ansible.builtin.copy:
        dest: "{{ remote_project_root }}/hosts/cloudbox/kernel-cmdline.extra"
        mode: '0644'
        content: "{{ cloudbox_extra_kernel_args | default('quiet console=ttyAMA0,115200 console=tty1') }}\n"

    - name: Write bootstrap ESP repart definition
      ansible.builtin.copy:
        dest: "{{ remote_project_root }}/deploy.repart/00-esp.conf"
        mode: '0644'
        content: |
          [Partition]
          Type=esp
          Label=ESP
          SizeMinBytes={{ cloudbox_esp_size | default('512M') }}
          SizeMaxBytes={{ cloudbox_esp_size | default('512M') }}
          Format=vfat
      when: cloudbox_bootstrap_mode

    - name: Write bootstrap root A repart definition
      ansible.builtin.copy:
        dest: "{{ remote_project_root }}/deploy.repart/10-root-a.conf"
        mode: '0644'
        content: |
          [Partition]
          Type=root
          Label=_empty
          SizeMinBytes={{ cloudbox_root_slot_size | default('8G') }}
          SizeMaxBytes={{ cloudbox_root_slot_size | default('8G') }}
      when: cloudbox_bootstrap_mode

    - name: Write bootstrap root B repart definition
      ansible.builtin.copy:
        dest: "{{ remote_project_root }}/deploy.repart/11-root-b.conf"
        mode: '0644'
        content: |
          [Partition]
          Type=root
          Label=_empty
          SizeMinBytes={{ cloudbox_root_slot_size | default('8G') }}
          SizeMaxBytes={{ cloudbox_root_slot_size | default('8G') }}
      when: cloudbox_bootstrap_mode

    - name: Clean any previous build artifacts
      ansible.builtin.command:
        chdir: "{{ remote_project_root }}"
        argv:
          - ./clean.sh
          - --all

    - name: Build the cloudbox image on the target host
      ansible.builtin.command:
        chdir: "{{ remote_project_root }}"
        argv:
          - ./build.sh
          - --profile
          - "{{ build_profile }}"
          - --host
          - "{{ build_host_overlay }}"
      register: build_result

    - name: Bootstrap a blank/offline target disk with the first sysupdate-managed version
      ansible.builtin.command:
        chdir: "{{ remote_project_root }}"
        argv:
          - ./bin/bootstrap-ab-disk.sh
          - --target
          - "{{ cloudbox_bootstrap_target }}"
          - --loader-timeout
          - "{{ cloudbox_loader_timeout | default(3) | string }}"
          - --yes
      when: cloudbox_bootstrap_mode
      register: bootstrap_result

    - name: Stage an in-place update with systemd-sysupdate
      ansible.builtin.command:
        chdir: "{{ remote_project_root }}"
        argv:
          - ./bin/sysupdate-local-update.sh
          - --source-dir
          - ./mkosi.output
      when: not cloudbox_bootstrap_mode
      register: sysupdate_result

    - name: Reboot into the newly staged retained version
      ansible.builtin.reboot:
        reboot_timeout: 1800
        msg: "Rebooting into the new retained system version"
      when: (not cloudbox_bootstrap_mode) and (cloudbox_update_reboot | default(true) | bool)

    - name: Wait for the host to come back
      ansible.builtin.wait_for_connection:
        timeout: 900
        delay: 5
      when: (not cloudbox_bootstrap_mode) and (cloudbox_update_reboot | default(true) | bool)

    - name: Read retained-version status after reboot
      ansible.builtin.command:
        argv:
          - /usr/local/sbin/ab-status
      register: ab_status_result
      changed_when: false
      when: (not cloudbox_bootstrap_mode) and (cloudbox_update_reboot | default(true) | bool)

    - name: Show retained-version status
      ansible.builtin.debug:
        var: ab_status_result.stdout_lines
      when: ab_status_result is defined

    - name: Optionally request manual bless after post-reboot validation
      ansible.builtin.command:
        argv:
          - /usr/local/sbin/ab-bless-boot
      when:
        - (not cloudbox_bootstrap_mode)
        - (cloudbox_update_reboot | default(true) | bool)
        - (cloudbox_bless_after_reboot | default(false) | bool)
