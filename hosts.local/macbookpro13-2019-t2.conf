# Host instance descriptor — MacBook Pro 13" 2019 (Apple T2).
# Copy to hosts.local/macbookpro13-2019-t2.conf and edit.
#
# T2 hardware enablement (kernel, firmware, suspend/audio/lid quirks)
# lives in the `macbook` model profile — not here. See docs/host-descriptors.md.

profiles        = macbook awesomewm display-manager-gdm3 dev-tools audio-pipewire wifi ssh-server tailscale cloudflare-tunnel healthchecksio ab-diagnostics signal vscode antigravity bluetooth brother-printer
hostname        = macbookpro
image_id_suffix = mbp13t2
kernel_cmdline  = quiet intel_iommu=on iommu=pt pcie_ports=compat pm_async=off mem_sleep_default=s2idle hid_apple.fnmode=1

# Secure Boot off: the T2 performs its own boot verification, and the
# Linux-on-T2 workaround disables it, so layered UEFI SB adds risk with
# no benefit. (Generates a secure-boot.disabled opt-out marker.)
secure_boot     = no
