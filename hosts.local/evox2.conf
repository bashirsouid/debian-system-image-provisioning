# Host instance descriptor — TEMPLATE.
#
# Copy this to hosts.local/<name>.conf (gitignored) and edit. When a
# descriptor exists for a host, build.sh renders it into a synthetic
# overlay and uses it instead of hosts/<name>/. See docs/host-descriptors.md.
#
# Format: "key = value", one per line. '#' starts a comment. Everything
# here is NON-SECRET — secrets (passwords, tokens, PSKs, S3 keys) stay in
# the age vault (secrets/*.json.age), which is already per-host.

# Space-separated profile and/or role names (replaces hosts/<name>/profile.default).
profiles        = kernel-liquorix devbox awesomewm dev-tools wifi tailscale ssh-server

# Image hostname (replaces hosts/<name>/mkosi.extra/etc/hostname).
hostname        = evox2

# Short alias for the GPT partition label (replaces hosts/<name>/image-id-suffix).
image_id_suffix = evox2

# Extra kernel command line (replaces hosts/<name>/kernel-cmdline.extra).
kernel_cmdline  = quiet amdgpu.gttsize=3072

# Secure Boot posture. yes -> mkosi signs the UKI with .secureboot/db.key.
# no  -> writes a secure-boot.disabled opt-out marker (printed on every build).
secure_boot     = yes

# Persistent /home mount: "<source> [fstype]". Generates the standard
# nofail fstab line (replaces hosts/<name>/mkosi.extra/etc/fstab).
persistent_home = LABEL=HOME ext4

# Optional non-secret backup paths, one space-separated list. Generates
# /etc/s3-backup-paths.conf (one path per line).
# backup_paths  = /etc/s3-backup-paths.conf /home
