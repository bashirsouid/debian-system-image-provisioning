# Host instance descriptor — cloudbox (Oracle Cloud Ampere A1, arm64).
# Copy to hosts.local/cloudbox.conf and edit. See docs/host-descriptors.md.

profiles        = server ssh-server tailscale cloudflare-tunnel healthchecksio
hostname        = cloudbox
image_id_suffix = cloudbx
architecture    = arm64
kernel_cmdline  = quiet console=ttyAMA0,115200 console=tty1 systemd.unit=multi-user.target
secure_boot     = yes
