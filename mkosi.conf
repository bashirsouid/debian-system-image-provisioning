[Distribution]
Distribution=debian
Release=trixie
Architecture=x86-64

[Output]
Format=disk
OutputDirectory=mkosi.output

[Content]
Bootable=yes
Bootloader=systemd-boot
UnifiedKernelImages=no
Packages=
    systemd
    systemd-sysv
    systemd-boot
    systemd-boot-efi
    systemd-boot-tools
    systemd-container
    systemd-repart
    binutils
    dosfstools
    e2fsprogs
    fdisk
    udev
    systemd-cryptsetup
    tpm2-tools
    cryptsetup
    cryptsetup-initramfs
    sudo
    bash
    dbus
    systemd-resolved
    passwd
    login
    # apt itself is priority "important", not "required", so a minimal
    # mkosi image happens to ship without it. Every booted machine
    # needs `apt install` for ad-hoc post-provisioning, so pin it here.
    # apt-utils silences the "delaying package configuration" warning
    # and is near-zero cost.
    apt
    apt-utils
RootPassword=!
RootShell=/bin/false

[Build]
BuildSources=.

[Runtime]
CPUs=2
RAM=4G
Console=gui

[Validation]
SecureBoot=no
