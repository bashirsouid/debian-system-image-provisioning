[Distribution]
Distribution=debian
Release=trixie
Architecture=x86-64

[Output]
Format=disk
Bootable=yes
Bootloader=systemd-boot
OutputDirectory=mkosi.output

[Content]
Packages=
    systemd
    systemd-sysv
    systemd-boot
    systemd-boot-efi
    linux-image-amd64
    udev
    sudo
    bash
    dbus
    systemd-resolved
    passwd
    login
ExtraTrees=.mkosi-secrets:/
RootPassword=!
RootShell=/bin/false

[Runtime]
CPUs=2
RAM=4G
Console=gui
