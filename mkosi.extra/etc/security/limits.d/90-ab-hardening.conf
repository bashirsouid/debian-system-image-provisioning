# /etc/security/limits.d/90-ab-hardening.conf
#
# Lower per-user resource limits. A runaway process in a single user
# session should not be able to take the whole box down.

# No core dumps by default (complemented by /etc/systemd/coredump.conf.d/).
*        hard    core            0
*        soft    core            0

# Cap simultaneous processes per user. Prevents a basic fork bomb
# from bringing the box down. The default is unlimited on most
# systems; 4096 is comfortable for a dev box.
*        soft    nproc           4096
*        hard    nproc           8192
root     soft    nproc           unlimited
root     hard    nproc           unlimited

# File descriptors: modern applications need many. 65536 soft is
# conservative; bump per-host if needed.
*        soft    nofile          65536
*        hard    nofile          1048576

# No unlimited locked memory in user space; root can still lock.
# Real-time audio apps and some ML workloads need higher rtprio
# and memlock; override in a host drop-in if needed.
*        hard    memlock         65536

# Size of the largest file a non-root user can write. Set to
# unlimited explicitly so this file does not introduce an
# unexpected regression.
*        hard    fsize           unlimited
