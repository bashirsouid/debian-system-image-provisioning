# /etc/systemd/resolved.conf.d/10-ab-hardening.conf
#
# Prefer encrypted DNS where the network supports it, while still
# preserving enough plain connectivity for captive portals, first-login,
# and Tailscale re-authentication.
#
# Uses Cloudflare's 1.1.1.1 and Quad9's 9.9.9.9 as upstream resolvers
# with opportunistic DNS-over-TLS (DoT). Link DNS learned from
# NetworkManager and split DNS pushed by Tailscale can coexist with
# these defaults.

[Resolve]
# Primary + fallback. Tailscale pushes MagicDNS servers at runtime when
# tailscale up runs with --accept-dns=true; systemd-resolved handles
# that split DNS while keeping normal Internet DNS available.
DNS=1.1.1.1#cloudflare-dns.com 1.0.0.1#cloudflare-dns.com 2606:4700:4700::1111#cloudflare-dns.com 2606:4700:4700::1001#cloudflare-dns.com
FallbackDNS=9.9.9.9#dns.quad9.net 149.112.112.112#dns.quad9.net 2620:fe::fe#dns.quad9.net 2620:fe::9#dns.quad9.net

# Use DoT when available, but do not strand first boot or captive portal
# networks that only expose regular DNS.
DNSOverTLS=opportunistic

# Do not validate DNSSEC on clients. `allow-downgrade` still hard-fails
# domains with broken/expired signatures, which stranded first-boot
# installers behind otherwise working DNS.
DNSSEC=no

# Enable multicast DNS for home-automation discovery (HomeKit,
# Chromecast, printers, HA's own mDNS discovery).
MulticastDNS=yes

# Never send our local search domain to upstream resolvers.
ResolveUnicastSingleLabel=no

# Do not cache failures for as long as the default (which hides
# transient network issues).
Cache=yes
CacheFromLocalhost=no
ReadEtcHosts=yes

# Accept search domains pushed by tailscaled/NetworkManager.
LLMNR=no
