# /etc/systemd/resolved.conf.d/10-ab-hardening.conf
#
# Encrypt DNS and validate DNSSEC. Prevents on-path DNS spoofing at
# home / at a coffee shop / on any hostile network.
#
# Uses Cloudflare's 1.1.1.1 and Quad9's 9.9.9.9 as upstream resolvers
# with Strict DNS-over-TLS (DoT). If a resolver fails, no fallback to
# unencrypted is attempted.

[Resolve]
# Primary + fallback. Tailscale may push MagicDNS servers at runtime
# via the "Domains=" push; that still works alongside this static
# upstream list.
DNS=1.1.1.1#cloudflare-dns.com 1.0.0.1#cloudflare-dns.com 2606:4700:4700::1111#cloudflare-dns.com 2606:4700:4700::1001#cloudflare-dns.com
FallbackDNS=9.9.9.9#dns.quad9.net 149.112.112.112#dns.quad9.net 2620:fe::fe#dns.quad9.net 2620:fe::9#dns.quad9.net

# DoT over port 853 with strict SNI verification.
DNSOverTLS=yes

# Validate DNSSEC. allow-downgrade would silently fall back to
# unvalidated; we want hard-fail so a hostile network cannot strip
# DNSSEC from us. Note: some corporate networks break DNSSEC; on
# those, set to allow-downgrade.
DNSSEC=yes

# Enable multicast DNS for home-automation discovery (HomeKit,
# Chromecast, printers, HA's own mDNS discovery).
MulticastDNS=yes

# Never send our local search domain to upstream resolvers.
ResolveUnicastSingleLabel=no

# Do not cache failures for as long as the default (which hides
# transient network issues).
Cache=yes
CacheFromLocalhost=no
ReadEtcHosts=yes

# Accept search domains pushed by tailscaled/NetworkManager, but do
# not accept their upstream DNS (ours is stricter).
LLMNR=no
