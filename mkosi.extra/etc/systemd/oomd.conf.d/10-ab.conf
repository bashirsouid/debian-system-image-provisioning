# /etc/systemd/oomd.conf.d/10-ab.conf
#
# systemd-oomd is a userspace OOM killer that uses PSI (pressure
# stall information) to kill heavy user sessions BEFORE the kernel's
# own OOM killer fires. The kernel OOMK picks its victim based on
# crude score heuristics and has a nasty history of killing sshd
# or Home Assistant. oomd picks based on cgroup-level pressure,
# which is far more accurate for our "keep infrastructure alive,
# kill user stuff" goal.
#
# Enable:
#   systemctl enable --now systemd-oomd.service
#
# Mark a cgroup as "please kill me before things that matter" by
# adding to its unit (e.g. user@.service drop-in, docker cgroup):
#   ManagedOOMMemoryPressure=kill
#   ManagedOOMMemoryPressureLimit=50%

[OOM]
# When to worry: if ANY monitored cgroup sees 60% memory pressure
# for 20 seconds, oomd selects a victim.
DefaultMemoryPressureLimit=60%
DefaultMemoryPressureDurationSec=20s

# When to act on swap: if system swap usage exceeds 90%, start killing.
# (Home hosts rarely have real swap; this is a safety net.)
SwapUsedLimit=90%
