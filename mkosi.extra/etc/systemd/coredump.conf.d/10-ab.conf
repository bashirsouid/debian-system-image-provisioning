# /etc/systemd/coredump.conf.d/10-ab.conf
#
# We do not want a crashing service to dump its address space (which
# might include secrets like the just-decrypted Tailscale auth key)
# to /var/lib/systemd/coredump/. And we REALLY do not want that
# directory to grow until / fills.
#
# Policy: do not write coredumps to disk. Log the fact of the crash
# via the journal, which we already cap at 2G.

[Coredump]
# "none" = never write to disk. The crash is still reported via
# journald and systemd-coredump can still show a stack via coredumpctl
# if the process lives briefly long enough to have its stack captured.
Storage=none
ProcessSizeMax=0
ExternalSizeMax=0

# Tight hard limits for the rare case someone flips Storage=external
# on a specific host.
MaxUse=64M
KeepFree=1G
Compress=yes
