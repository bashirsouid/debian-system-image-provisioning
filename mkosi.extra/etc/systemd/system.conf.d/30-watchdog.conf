# /etc/systemd/system.conf.d/30-watchdog.conf
#
# Hardware watchdog: if the kernel stops servicing the watchdog for
# 60 seconds, the platform forces a hardware reset. This is the
# single most important reliability knob on a headless home-auto
# host. Without it, a kernel hang leaves you with a dead box until
# someone physically resets it.
#
# RuntimeWatchdogSec : how long the kernel has to ping the hardware
#                      watchdog before it triggers. 60s is a reasonable
#                      balance: long enough to not fire on a heavy
#                      fsync burst, short enough to recover quickly.
# RebootWatchdogSec  : during shutdown, if systemd gets stuck, trigger
#                      a forced reboot instead of hanging forever.
# ShutdownWatchdogSec: deprecated alias; we set the modern name.
#
# Requires a hardware watchdog device at /dev/watchdog. On Intel
# chipsets, the iTCO driver provides this. On ARM boards, the SoC
# watchdog driver provides this (broadcom bcm2835_wdt, rockchip_wdt,
# etc.). mkosi's default kernel config has them enabled; confirm on
# a new platform with: `ls -l /dev/watchdog*` at runtime.

[Manager]
RuntimeWatchdogSec=60s
RebootWatchdogSec=10min
