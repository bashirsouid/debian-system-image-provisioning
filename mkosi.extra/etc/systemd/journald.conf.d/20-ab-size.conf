# /etc/systemd/journald.conf.d/20-ab-size.conf
#
# Cap journal growth. A runaway error loop could otherwise fill the
# root partition, which is particularly bad on A/B slots where root
# is sized tight (8G per the README).
#
# SystemMaxUse       : hard cap on persistent journal size.
# SystemKeepFree     : always leave this much space free on the fs.
# RuntimeMaxUse      : cap on /run/log/journal, which is tmpfs (RAM).
# MaxRetentionSec    : expire entries older than 30 days regardless.
# ForwardToSyslog    : off to avoid double-writing.

[Journal]
Storage=persistent
Compress=yes
Seal=yes

SystemMaxUse=2G
SystemKeepFree=1G
SystemMaxFileSize=128M
RuntimeMaxUse=128M
RuntimeKeepFree=256M
MaxRetentionSec=30day

ForwardToSyslog=no
ForwardToKMsg=no
ForwardToConsole=no
ForwardToWall=no
