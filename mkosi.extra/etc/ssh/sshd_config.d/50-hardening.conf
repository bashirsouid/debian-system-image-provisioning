# SSH hardening for A/B-provisioned hosts.
#
# Assumptions:
# - You ship a single non-root login user; its name is available at
#   build time as INITIAL_USERNAME (or the first user in .users.json).
#   That name is templated into this file by
#   scripts/package-credentials.sh via `sed`.
# - Authentication is by hardware-backed SSH key only. Generate on the
#   client with:
#       ssh-keygen -t ed25519-sk -O resident -O verify-required -C "<host>"
#   Place the PUBLIC key into .mkosi-secrets/ssh-authorized-keys before
#   building the image.

Port 22
Protocol 2

# Auth
PermitRootLogin no
PasswordAuthentication no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
PermitEmptyPasswords no
PubkeyAuthentication yes
# Forces user presence on FIDO2 authenticators for sk-* keys.
# Has no effect on non-sk keys, but see AuthorizedKeysFile below.
PubkeyAuthOptions verify-required
AuthenticationMethods publickey

# Only accept keys from the baked-in authorized_keys file. /home may be
# on a separate partition that is not yet mounted during initrd sshd or
# recovery boots, so we do not rely on it.
AuthorizedKeysFile /etc/ssh/authorized_keys.d/%u

# Users
# __INITIAL_USERNAME__ is replaced by package-credentials.sh
AllowUsers __INITIAL_USERNAME__

# Modern crypto only (OpenSSH 9.x on trixie supports all of these).
KexAlgorithms [email protected],curve25519-sha256,[email protected],[email protected]
Ciphers [email protected],[email protected],[email protected]
MACs [email protected],[email protected],[email protected]
HostKeyAlgorithms ssh-ed25519,[email protected],[email protected],[email protected]

# Hygiene
LoginGraceTime 20
MaxAuthTries 3
MaxSessions 4
ClientAliveInterval 60
ClientAliveCountMax 3

# Features we do not want on a workstation / edge host.
AllowAgentForwarding no
AllowTcpForwarding no
X11Forwarding no
PermitTunnel no
GatewayPorts no
PermitUserEnvironment no
UseDNS no
Compression no

# Log enough to notice brute force, not so much that journald OOMs.
LogLevel VERBOSE
