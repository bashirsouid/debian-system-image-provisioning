# /etc/sysctl.d/95-ab-kernel-hardening.conf
#
# Kernel-level hardening. Distinct from 90-ab-reliability.conf (which
# is about auto-recovery) and from the default Debian settings.
#
# Each setting has a one-line rationale. If something breaks on a
# specific host, comment it out in a host-specific overlay rather than
# editing this file.

# ---- Memory / exec protections ----------------------------------------
# Fire-and-forget protections that are on-by-default on modern Debian
# but we set them explicitly so they survive kernel upgrades that
# might change defaults.
kernel.kptr_restrict       = 2   # hide kernel pointers from /proc
kernel.dmesg_restrict      = 1   # only CAP_SYSLOG can read dmesg
kernel.printk              = 3 3 3 3
kernel.perf_event_paranoid = 3   # disable unprivileged perf_event_open
kernel.randomize_va_space  = 2   # full ASLR

# ---- Attack-surface reduction -----------------------------------------
# ptrace: only a direct parent can ptrace its child. Blocks most
# unprivileged local debugger-based attacks. Set to 3 to disable
# entirely; 1 is the usual sweet spot.
kernel.yama.ptrace_scope = 1

# BPF: unprivileged BPF has been a recurrent source of LPE CVEs.
# Disable it; JIT is still available to privileged callers.
kernel.unprivileged_bpf_disabled = 1
net.core.bpf_jit_harden          = 2

# Loading new kernel modules only from root; block userspace from
# autoloading via socket/netlink/etc.
kernel.modules_disabled          = 0   # 1 would break module updates; use after freeze
dev.tty.ldisc_autoload           = 0   # prevents TIOCSETD-based module autoloading

# kexec: a compromised root could use kexec_load to boot an unsigned
# kernel, bypassing our Secure Boot story once that lands. Disable
# runtime kexec loading.
kernel.kexec_load_disabled = 1

# Reduce NMI-watchdog noise on boards without a real NMI source.
# Comment out on hardware where you specifically want hard-lockup
# detection via NMI.
# kernel.nmi_watchdog = 0

# ---- Filesystem protections -------------------------------------------
fs.protected_fifos    = 2
fs.protected_hardlinks = 1
fs.protected_regular  = 2
fs.protected_symlinks = 1
fs.suid_dumpable      = 0

# ---- IPv4 network hardening -------------------------------------------
net.ipv4.conf.all.accept_redirects        = 0
net.ipv4.conf.default.accept_redirects    = 0
net.ipv4.conf.all.secure_redirects        = 0
net.ipv4.conf.default.secure_redirects    = 0
net.ipv4.conf.all.send_redirects          = 0
net.ipv4.conf.default.send_redirects      = 0

net.ipv4.conf.all.accept_source_route     = 0
net.ipv4.conf.default.accept_source_route = 0

net.ipv4.conf.all.rp_filter               = 1
net.ipv4.conf.default.rp_filter           = 1

net.ipv4.conf.all.log_martians            = 1
net.ipv4.conf.default.log_martians        = 1

net.ipv4.icmp_echo_ignore_broadcasts      = 1
net.ipv4.icmp_ignore_bogus_error_responses = 1

net.ipv4.tcp_syncookies                   = 1
net.ipv4.tcp_rfc1337                      = 1

# ---- IPv6 network hardening -------------------------------------------
net.ipv6.conf.all.accept_redirects        = 0
net.ipv6.conf.default.accept_redirects    = 0
net.ipv6.conf.all.accept_source_route     = 0
net.ipv6.conf.default.accept_source_route = 0

# IPv6 privacy extensions on by default. Keeps a consistent identifier
# for inbound connections (stable) while using temporary addresses for
# outbound (private). Good for Tailscale + home networks.
net.ipv6.conf.all.use_tempaddr     = 2
net.ipv6.conf.default.use_tempaddr = 2

# Disable router advertisements on interfaces that should be statically
# configured (Tailscale tun0 is fine, it doesn't use RAs). If you use
# SLAAC on your LAN, comment these out.
net.ipv6.conf.all.accept_ra     = 1
net.ipv6.conf.default.accept_ra = 1

# ---- Home LAN IPv4 forwarding -----------------------------------------
# Home Assistant sometimes wants forwarding (e.g. for exposing services
# on VLANs). Off by default; flip on per-host if needed.
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0
