# /etc/sysctl.d/90-ab-reliability.conf

# Reboot 30s after a kernel panic rather than hanging forever. Paired
# with the hardware watchdog, this means the box will try to recover
# on its own in all cases except a stuck early-boot loop (which the
# A/B rollback handles).
kernel.panic = 30

# Treat an oops as a panic. Some bugs otherwise leave the machine in
# a half-working state that looks "up" to the outside but is actually
# broken in subtle ways, which is worse than a clean reboot.
kernel.panic_on_oops = 1

# Panic if the hard-lockup detector fires.
kernel.hardlockup_panic = 1

# Panic on softlockup. Slightly aggressive; comment out if you see
# false positives on a specific host, but for a home-auto box the
# tradeoff is clearly on the side of "reboot me, I'd rather come back
# than silently stall."
kernel.softlockup_panic = 1

# Enable a subset of SysRq (sync, remount-ro, reboot, reisub-class
# keys) so you can force-recover a hung box over a serial console
# without a hard power cycle. 0x1f = sync,mount-ro,reboot,keyboard,debug.
kernel.sysrq = 244

# Aggressive dirty-page writeback for spinning rust or flash with
# weak power-loss-protection. Keeps dirty data in RAM for no more
# than 10 seconds, which caps how much state is lost on power loss.
vm.dirty_expire_centisecs = 1000
vm.dirty_writeback_centisecs = 500

# Enable TCP BBR (Linux 4.9+); much better throughput on loss-prone
# links to SendGrid / PagerDuty / healthchecks.io over flaky wifi.
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# Reserve some socket buffer room for slow outbound connections so
# alert posts do not stall waiting for buffer allocation under memory
# pressure.
net.core.rmem_default = 262144
net.core.wmem_default = 262144
