# /etc/modprobe.d/ab-blacklist.conf
#
# Blacklist kernel modules we do not expect to ever load on a home
# workstation / home-automation host. A module that cannot autoload
# is not reachable from userspace via the usual "socket triggers
# autoload" pattern, which has been a recurring LPE vector.
#
# If a host legitimately needs one of these (e.g. a USB webcam that
# needs a specific uvcvideo alternate), override in a host-specific
# /etc/modprobe.d/host-<hostname>.conf drop-in with `install <mod> ...`.

# ---- Obscure / legacy network protocols -------------------------------
install dccp  /bin/true
install sctp  /bin/true
install rds   /bin/true
install tipc  /bin/true
install n-hdlc /bin/true
install ax25  /bin/true
install netrom /bin/true
install x25   /bin/true
install rose  /bin/true
install decnet /bin/true
install econet /bin/true
install af_802154 /bin/true
install ipx   /bin/true
install appletalk /bin/true
install psnap /bin/true
install p8023 /bin/true
install p8022 /bin/true
install llc   /bin/true
install atm   /bin/true

# ---- Obscure / legacy filesystems -------------------------------------
# These have been repeat CVE sources because they parse attacker-
# controlled on-disk formats. Useful attack primitive: plug in a
# hostile USB stick with a crafted filesystem image.
install cramfs  /bin/true
install freevxfs /bin/true
install jffs2   /bin/true
install hfs     /bin/true
install hfsplus /bin/true
install squashfs /bin/true
install udf     /bin/true
install ksmbd   /bin/true
# Keep: ext4, vfat (ESP), ntfs3 (if you ever mount NTFS USBs)

# ---- Legacy bluetooth and RF drivers we do not use --------------------
# Uncomment on hosts that do not use Bluetooth at all. Left on by
# default because your MacBook T2 profile does use Bluetooth.
# install bluetooth /bin/true
# install btusb    /bin/true

# ---- Firewire / Thunderbolt DMA attack surface ------------------------
# Firewire is an historic DMA-attack surface. Disable unless
# specifically needed. Thunderbolt is handled separately (boltctl).
install firewire-core /bin/true
install firewire-ohci /bin/true
install firewire-sbp2 /bin/true

# ---- Old USB storage quirks -------------------------------------------
# usb-storage itself is fine; uas (USB Attached SCSI) has been buggy
# on some devices but we keep it because it's needed for any modern
# USB-3 SSD. If you only use flash sticks, you can disable:
# install uas /bin/true

# ---- Blacklist aliases pro forma --------------------------------------
blacklist dccp
blacklist sctp
blacklist rds
blacklist tipc
blacklist cramfs
blacklist freevxfs
blacklist jffs2
blacklist hfs
blacklist hfsplus
blacklist udf
blacklist firewire-core
blacklist firewire-ohci
