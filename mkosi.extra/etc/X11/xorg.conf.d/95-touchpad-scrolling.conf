# Force "traditional" (reverse) scrolling on touchpads — content moves
# opposite to finger direction. libinput's default and some desktops/sessions
# enable "natural" (macOS-style) scrolling; this pins the preferred behavior at
# the X driver level for every touchpad-equipped host (macbook, thinkpad, ...).
#
# Restored after it was dropped during a large refactor (originally added in
# commit e48fb5c). If a desktop session still flips scrolling to natural,
# check `xinput list-props "<touchpad>"` — a session-level setting overrides
# this Xorg default and would need fixing there too.
Section "InputClass"
    Identifier "Force traditional scrolling"
    MatchIsTouchpad "on"
    Driver "libinput"
    Option "NaturalScrolling" "false"
EndSection
